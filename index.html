<!DOCTYPE html>

<head>

    <title>Agentforce Chat Host</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
    </style>
</head>
<body>

    <script>
        // Fix for the automatic publicPath environment bug we handled earlier
        window.__webpack_public_path__ = "https://your-username.github.io/agentforce-chat/";
    </script>

    <!-- YOUR UNMODIFIED SALESFORCE CODE SNIPPET (with our additions inside) -->
    <script type='text/javascript'>
        function initEmbeddedMessaging() {
            try {
                // 1. HIDE THE STANDARD FLOATING ACTION BUTTON
                embeddedservice_bootstrap.settings.hideChatButtonOnLoad = true; //

                // 2. LISTEN FOR THE BOOTSTRAP TO READY UP, THEN FORCE MAXIMIZE
                window.addEventListener("onEmbeddedMessagingReady", () => {
                    console.log("Salesforce Chat Engine Ready. Auto-expanding...");
                    embeddedservice_bootstrap.utilAPI.launchChat() //
                        .catch((err) => console.error("Auto-launch failed: ", err));
                });

                // --- Start of your standard Salesforce-provided snippet lines ---
                embeddedservice_bootstrap.settings.language = 'en_US'; 
                
                embeddedservice_bootstrap.init(
                    '00DgL00000TDiQj',
                    'External_Agent_Channel',
                    'https://trailsignup-bf79e7a5f262b4.my.site.com/ESExternalAgentChannel171',
                    {
                        scrt2URL: 'https://trailsignup-bf79e7a5f262b4.my.salesforce-scrt.com'
                    }
                );
                // --- End of your standard Salesforce-provided snippet lines ---
                
            } catch (err) {
                console.error('Error loading Embedded Messaging: ', err);
            }
        };
    </script>
    <script type='text/javascript' src='https://trailsignup-bf79e7a5f262b4.my.salesforce-scrt.com/embeddedservice/async/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>

</body>
